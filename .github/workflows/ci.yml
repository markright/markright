name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove pre-installed Rust
        run: rustup self uninstall -y

      - uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - run: pnpm install --frozen-lockfile

      - run: moon ci
